name: release
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: macos-15
    environment: pypi
    permissions:
      id-token: write  # PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs derives the version from the tag
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
